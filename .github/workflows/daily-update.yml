name: Weekly Price Update

on:
  # 毎週金曜 00:00 UTC = 金曜 09:00 JST
  schedule:
    - cron: '0 0 * * 5'
  # 手動実行も可能
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update scripts
        run: python scripts/update_all.py

      - name: Commit data changes
        run: |
          git config user.name "price-tracker-bot"
          git config user.email "price-tracker-bot@users.noreply.github.com"
          git add data/ docs/data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly data update $(date -u +%Y-%m-%d)"
            git push
          fi
