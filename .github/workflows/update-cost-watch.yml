name: Update Cost-Watch Data

on:
  # 毎週月曜 00:00 UTC = 09:00 JST (Slack配信に合わせて月曜朝に統一)
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run consistency tests
        # cd into the package dir so sibling 'consistency' module resolves
        run: |
          cd scripts/cost_watch
          python -m unittest test_consistency.py -v

      # ------------------------------------------------------------
      # Fuel category — 3 sources, each isolated so one failure does
      # not stop the others.
      # ------------------------------------------------------------
      - name: Fuel — 石油情報センター (XLS)
        run: python scripts/scrapers/fuel/oil_info.py
        continue-on-error: true

      - name: Fuel — e燃費 (実勢価格)
        run: python scripts/scrapers/fuel/e_nenpi.py
        continue-on-error: true

      - name: Fuel — 資源エネルギー庁 (週次調査)
        run: python scripts/scrapers/fuel/enecho.py
        continue-on-error: true

      - name: Merge fuel category
        run: python scripts/cost_watch/merge.py fuel

      # ------------------------------------------------------------
      # Future categories: materials / wages / logistics / electricity
      # will be added here once their scrapers are implemented.
      # ------------------------------------------------------------

      - name: Show resulting JSON summary
        run: |
          python -c "
          import json, pathlib
          for p in sorted(pathlib.Path('data/cost-watch').glob('*.json')):
            d = json.load(open(p))
            print(f'{p.name}: last_updated={d.get(\"last_updated\")}')
            for it in d.get('items', []):
              vr = it.get('value_range') or {}
              print(f'  - {it[\"id\"]}: {it[\"sources_count\"]}src '
                    f'flag={it[\"consistency_flag\"]} '
                    f'range=[{vr.get(\"min\")}..{vr.get(\"max\")}] '
                    f'dev={it[\"max_deviation_pct\"]}%')
          "

      - name: Commit and push if changes
        run: |
          git config user.name "cost-watch-bot"
          git config user.email "cost-watch-bot@users.noreply.github.com"
          git add data/cost-watch/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(cost-watch): weekly update $(date -u +%Y-%m-%d)"
            git push
          fi

      # ------------------------------------------------------------
      # Slack notification — fires AFTER data update, so the message
      # reflects the latest snapshot. Failure here never breaks the
      # pipeline (notify_slack.py always exits 0).
      # ------------------------------------------------------------
      - name: Slack notification (#価格チャート141)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/cost_watch/notify_slack.py fuel
